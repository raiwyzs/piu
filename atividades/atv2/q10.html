<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q10 - Cadastro com Validação</title>
</head>
<body>
    <h1>Questão 10 - Cadastro de Pessoa com Validação</h1>
    <p>Veja o console do navegador (F12) para ver os resultados.</p>

    <script>
        // Funções de validação
        // Valida se o nome é uma string não vazia
        function validarNome(nome) {
            if (typeof nome !== "string" || nome.trim() === "") {
                throw "Erro: nome deve ser uma string não vazia!";
            }
            return nome;
        }

        // Valida a idade: converte para inteiro e verifica intervalo válido
        function validarIdade(idade) {
            let idadeNum = parseInt(idade);
            if (!Number.isInteger(idadeNum) || idadeNum < 0 || idadeNum > 150) {
                throw "Erro: idade deve ser um número inteiro entre 0 e 150!";
            }
            return idadeNum;
        }

        // Valida resposta textual para saber se já foi à Disney
        function validarFoiADisney(resposta) {
            // Aceita variações como 'sim', 's', 'não', 'nao', 'n'
            if (resposta.toLowerCase() === "sim" || resposta.toLowerCase() === "s") {
                return true;
            } else if (resposta.toLowerCase() === "não" || resposta.toLowerCase() === "nao" || resposta.toLowerCase() === "n") {
                return false;
            } else {
                // Caso não reconheça a resposta, lança erro
                throw "Erro: digite 'sim' ou 'não'!";
            }
        }

        // Variáveis para armazenar dados válidos (inicialmente null para indicar ausência)
        let nome = null;
        let idade = null;
        let jaFoiADisney = null;

        // Solicita o nome até receber uma entrada válida
        while (nome === null) {
            try {
                let entrada = prompt("Digite o nome:");
                nome = validarNome(entrada);
            } catch (erro) {
                // Mostra alerta ao usuário em caso de entrada inválida
                alert(erro);
            }
        }

        // Solicita a idade até receber uma entrada válida
        while (idade === null) {
            try {
                let entrada = prompt("Digite a idade:");
                idade = validarIdade(entrada);
            } catch (erro) {
                alert(erro);
            }
        }

        // Solicita se já foi à Disney até receber resposta válida
        while (jaFoiADisney === null) {
            try {
                let entrada = prompt("Já foi à Disney? (sim/não):");
                jaFoiADisney = validarFoiADisney(entrada);
            } catch (erro) {
                alert(erro);
            }
        }

        // Cria um objeto com os dados validados
        let pessoa = {
            nome: nome,
            idade: idade,
            ja_foi_a_Disney: jaFoiADisney
        };

        // Exibe os dados no console e mostra um alerta de confirmação
        console.log("Dados cadastrados:");
        console.log(pessoa);
        alert("Cadastro realizado com sucesso!\nNome: " + pessoa.nome + "\nIdade: " + pessoa.idade + "\nJá foi à Disney: " + pessoa.ja_foi_a_Disney);
    </script>
</body>
</html>
